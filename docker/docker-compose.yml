name: rythmify

services:
  db:
    image: postgres:16
    container_name: rythmify_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rythmify_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: rythmify_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - rythmify_network
    depends_on:
      db:
        condition: service_healthy

  blob:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: rythmify_blob
    restart: unless-stopped
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --skipApiVersionCheck --loose --debug /data/debug.log
    ports:
      - "10000:10000"
    volumes:
      - azurite_data:/data
    networks:
      - rythmify_network

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: rythmify_backend
    restart: unless-stopped
    env_file:
      - ../environments/.env
    ports:
      - "8080:8080"
    networks:
      - rythmify_network
    depends_on:
      db:
        condition: service_healthy
      blob:
        condition: service_started
    volumes:
      - ../../backend:/app
      - /app/node_modules

volumes:
  postgres_data:
  pgadmin_data:
  azurite_data:

networks:
  rythmify_network:
    driver: bridge
