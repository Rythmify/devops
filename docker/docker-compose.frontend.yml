name: rythmify

services:
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: rythmify_frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api/v1
      - VITE_USE_MOCK=false
      - VITE_APP_URL=http://localhost:5173
    ports:
      - "5173:5173"
    networks:
      - rythmify_network
    volumes:
      - ../../frontend:/app
      - /app/node_modules

networks:
  rythmify_network:
    external: true
    name: rythmify_rythmify_network
